name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gentle_reminder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx turbo build

      - run: npx turbo lint

      - run: npx turbo test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/gentle_reminder_test
          JWT_SECRET: test-jwt-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci

  security-scan:
    name: Security scan (secrets + deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Fortress-audit H-8/H-14: CI lacked secret scanning, no audit step.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41f1a0ae7f1f6940bd2a4 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # High+ advisories surfaced but non-blocking until Day-30 milestone.
      - name: npm audit (production deps, high+)
        run: npm audit --audit-level=high --omit=dev || echo "npm audit advisories surfaced (non-blocking pre-Day-30)"

      - name: Generate SBOM (CycloneDX)
        run: bash scripts/generate-sbom.sh || echo "SBOM generation non-blocking"

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom
          path: docs/cybersecurity/sbom.json
          if-no-files-found: ignore
          retention-days: 90

  python-security-scan:
    name: Python dep audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ai/requirements.txt
      - run: pip install -r services/ai/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r services/ai/requirements.txt --strict || echo "pip-audit advisories surfaced (non-blocking pre-Day-30)"
