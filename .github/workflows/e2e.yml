name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gentle_reminder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx turbo build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: npm run dev --workspace=services/api &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/gentle_reminder_test
          JWT_SECRET: test-jwt-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci
          PORT: 3000

      - name: Wait for API
        run: npx wait-on http://localhost:3000/health --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts --project=chromium
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3000

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
