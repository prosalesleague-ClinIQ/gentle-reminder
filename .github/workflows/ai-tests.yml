name: AI Service Tests

on:
  push:
    branches: [main]
    paths:
      - 'services/ai/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/ai/**'

jobs:
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ai/requirements.txt

      - name: Install dependencies
        run: pip install -r services/ai/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run linting
        run: |
          pip install ruff
          ruff check services/ai/src/

      - name: Run tests
        run: |
          cd services/ai
          python -m pytest tests/ -v --tb=short
        env:
          WHISPER_MODEL: tiny
          OPENAI_API_KEY: test-key
          ENVIRONMENT: test
