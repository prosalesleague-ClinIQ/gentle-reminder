apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: gentle-reminder
  labels:
    app.kubernetes.io/name: ai
    app.kubernetes.io/part-of: gentle-reminder
    app.kubernetes.io/component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai
        app.kubernetes.io/part-of: gentle-reminder
        app.kubernetes.io/component: ai
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 60
      # Uncomment the following to schedule on GPU-capable nodes:
      # nodeSelector:
      #   nvidia.com/gpu.present: "true"
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      containers:
        - name: ai
          image: ghcr.io/gentle-reminder/ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gentle-reminder-config
            - secretRef:
                name: gentle-reminder-secrets
          # Uncomment for GPU workloads:
          # resources:
          #   limits:
          #     nvidia.com/gpu: 1
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
