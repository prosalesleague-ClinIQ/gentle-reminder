apiVersion: v1
kind: ConfigMap
metadata:
  name: gentle-reminder-config
  namespace: gentle-reminder
  labels:
    app.kubernetes.io/part-of: gentle-reminder
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://gentlereminder.health,https://app.gentlereminder.health"
  API_URL: "http://api-service:3000"
  AI_SERVICE_URL: "http://ai-service:8000"
  MEMORY_GRAPH_URL: "http://memory-graph-service:3001"
  NEO4J_HOST: "neo4j-service"
  NEO4J_PORT: "7687"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
