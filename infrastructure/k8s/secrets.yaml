apiVersion: v1
kind: Secret
metadata:
  name: gentle-reminder-secrets
  namespace: gentle-reminder
  labels:
    app.kubernetes.io/part-of: gentle-reminder
type: Opaque
stringData:
  # Replace placeholder values before applying.
  # In production, use a secrets manager (e.g. AWS Secrets Manager, Vault)
  # and an external-secrets operator instead of committing values here.
  DATABASE_URL: "postgresql://gentle_reminder:CHANGE_ME@postgres-service:5432/gentle_reminder?sslmode=require"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_RANDOM_STRING"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_ANOTHER_SECURE_RANDOM_STRING"
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"
  ELEVENLABS_API_KEY: "CHANGE_ME"
  REDIS_URL: "redis://redis-service:6379"
  POSTGRES_PASSWORD: "CHANGE_ME"
