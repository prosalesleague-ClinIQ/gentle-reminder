version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gentle-reminder-db
    environment:
      POSTGRES_USER: gentle_reminder
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: gentle_reminder_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gentle_reminder']
      interval: 5s
      timeout: 5s
      retries: 5

  # Phase 2: Neo4j for memory graph
  # neo4j:
  #   image: neo4j:5-community
