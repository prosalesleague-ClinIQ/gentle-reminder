global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s

receivers:
  - name: 'default'
    # In production: configure webhook, email, or PagerDuty
    webhook_configs: []

  - name: 'critical'
    # In production: configure PagerDuty or SMS
    webhook_configs: []
